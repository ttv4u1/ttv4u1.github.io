<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Gateway Malaysia | Futuristik</title>
    <!-- Font & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <style>
        :root {
            --gold: #ffcc00;
            --blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.07);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            background: #020205; /* Warna hitam pekat untuk kontras */
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* LAYER 1: Realistic Jata Negara Background */
        .background-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(0,212,255,0.05) 0%, rgba(0,0,0,1) 80%);
        }

        .jata-bg {
            width: 80%;
            max-width: 800px;
            height: auto;
            opacity: 0.4;
            filter: drop-shadow(0 0 50px rgba(255, 204, 0, 0.2));
            animation: pulse 8s infinite alternate;
        }

        /* LAYER 2: Digital Grid Overlay */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        /* Main Content Card */
        .portal-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px;
            text-align: center;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(255, 204, 0, 0.5);
            animation: slideIn 1.5s ease-out;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            font-size: 1.8rem;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .status-tag {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--blue);
            color: var(--blue);
            border-radius: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* Button Futuristic */
        .btn-portal {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            text-decoration: none;
            background: linear-gradient(45deg, #ffcc00, #ffae00);
            color: #000;
            padding: 20px 40px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(255, 204, 0, 0.3);
            font-family: 'Orbitron', sans-serif;
        }

        .btn-portal:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 20px 50px rgba(255, 204, 0, 0.5);
            background: #fff;
        }

        .btn-portal i {
            font-size: 1.4rem;
        }

        /* Icons Group */
        .mini-infographic {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .info-box {
            color: #fff;
        }

        .info-box i {
            font-size: 1.5rem;
            color: var(--gold);
            margin-bottom: 10px;
            display: block;
        }

        .info-box span {
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.6;
            letter-spacing: 1px;
        }

        /* Animations */
        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.5; transform: scale(1.05); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .portal-card { padding: 30px 20px; }
            h1 { font-size: 1.4rem; }
            .btn-portal { font-size: 1rem; padding: 15px 20px; }
            .jata-bg { width: 120%; } /* Zoom sikit di mobile */
        }
    </style>
</head>
<body>

    <!-- Background Layer -->
    <div class="background-wrapper">
        <div class="grid-overlay"></div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Coat_of_arms_of_Malaysia.svg/1200px-Coat_of_arms_of_Malaysia.svg.png" 
             alt="Jata Negara Malaysia" class="jata-bg">
    </div>

    <!-- Main Container -->
    <div class="portal-card">
        <div class="status-tag">Secure Encryption Active</div>
        <h1>MALAYSIA DIGITAL</h1>
        <p style="color: rgba(255,255,255,0.6); margin-bottom: 30px;">Gerbang Korporat Masa Depan</p>

        <!-- MASUKKAN LINK ANDA DI BAWAH INI -->
        <a href="https://ttv4u1.github.io/pv" class="btn-portal">
            <i class="fas fa-sign-in-alt"></i>
            Akses Sistem
        </a>

        <!-- Infografis Mini Icons -->
        <div class="mini-infographic">
            <div class="info-box">
                <i class="fas fa-fingerprint"></i>
                <span>Biometric</span>
            </div>
            <div class="info-box">
                <i class="fas fa-microchip"></i>
                <span>AI Core</span>
            </div>
            <div class="info-box">
                <i class="fas fa-network-wired"></i>
                <span>Cloud 5G</span>
            </div>
        </div>
    </div>

</body>
</html>
